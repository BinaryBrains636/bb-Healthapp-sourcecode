# ===============================
# APP CONFIG
# ===============================
spring.application.name=master-service
server.port=8081

spring.profiles.active=@profileActive@

# ===============================
# SECURITY / JWT
# ===============================
token.secret=10d73c0906053a33e5b96500d7c5eeaf1674ed717f199a54c5baff4d7da9d0b0

server.error.include-message=always

# ===============================
# APP FLAGS
# ===============================
app.testrun=false

spring.jackson.serialization.fail-on-empty-beans=false

# ===============================
# H2 DATABASE CONFIG (MASTER SERVICE)
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:file:~/masterdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# IMPORTANT: allow H2 console in browser
spring.h2.console.settings.web-allow-others=true

# ===============================
# MULTIPART CONFIG
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB


MASTER_SVC_HOST=localhost
MASTER_SVC_PORT=8081


# ===============================
# MICROSERVICE COMMUNICATION
# ===============================
# (Used by other services if they call master service)
rootURL=http://${MASTER_SVC_HOST:localhost}:${MASTER_SVC_PORT:8081}



# ===============================
# LOGGING (OPTIONAL BUT USEFUL)
# ===============================
logging.level.org.springframework=INFO
logging.level.org.binarybrains=DEBUG